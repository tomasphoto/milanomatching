<meta property="og:description" content="80 m² · €2300/mese · A pochi passi da Corso Garibaldi e dal quartiere Porta Nuova, proponiamo in locazione un ampio e luminoso bilocale di circa 80 mq, situato al sesto piano di un elegante stabile signorile dotato di ascensore. L'appartamento, completamente ristrutturato e arredato con mobili di design come ad esempio il tavolo da Padova e il divano Cappellini, si compone di una spaziosa zona giorno con cucina a vista, impreziosita da un terrazzino con piacevole vista panoramica sulla città. Completano la proprietà una funzionale zona lavanderia, una camera da letto e un bagno moderno con doccia. L'immobile è dotato di riscaldamento centralizzato a pavimento e di aria condizionata in tutti gli ambienti. Presente inoltre servizio di portineria attivo per l'intera giornata.">
